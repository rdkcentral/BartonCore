#
# Docker Compose overlay that adds an OpenTelemetry Collector and Jaeger
# instance for visualizing traces, metrics, and logs from Barton.
#
# No host ports are published by this file -- all inter-service traffic uses
# the Docker network (otel-collector:4318, jaeger:4317). The Jaeger UI is
# accessed differently depending on the environment:
#
#   Devcontainer:  socat proxies jaeger:16686 into the barton container so
#                  VS Code can forward port 16686 to the local browser.
#                  See .devcontainer/devcontainer.json (postStartCommand).
#
#   dockerw -o:    A temporary compose override publishes Jaeger on an
#                  ephemeral host port. The assigned URL is printed at
#                  startup (e.g. "Jaeger UI available at http://0.0.0.0:49152").
#
# The Barton container should be built with -DBCORE_OBSERVABILITY=ON.
#

services:
    barton:
        environment:
            # otel-collector will resolve to local service, not a remote host
            - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
            - OTEL_SERVICE_NAME=barton-core
        depends_on:
            - otel-collector

    otel-collector:
        image: otel/opentelemetry-collector-contrib:0.104.0
        volumes:
            - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
        networks:
            - barton-ip6net

    jaeger:
        image: jaegertracing/all-in-one:1.58
        environment:
            - COLLECTOR_OTLP_ENABLED=true
        networks:
            - barton-ip6net
