#
# Optional Docker Compose overlay that adds a real Thread Border Router
# container backed by a real USB radio.
#
# The container runs:
#   - cpcd        : CPC daemon (USB serial <-> CPC socket)
#   - otbr-agent  : OpenThread Border Router agent (CPC socket <-> D-Bus API)
#
# A named volume (dbus-socket) shares a private D-Bus socket directory between
# this container and the main barton/devcontainer so that Barton code can reach
# otbr-agent over D-Bus exactly as it does with the simulated setup.
# This is not the host's /var/run/dbus; the otbr-radio container starts and
# owns its own private dbus-daemon for this overlay.
#
# Running this overlay is OPTIONAL.  Do not include it unless a physical radio
# is available (either locally attached or forwarded via USB-IP).
#
# ─── Usage ───────────────────────────────────────────────────────────────────
#
#   CLI (dockerw)
#       ./dockerw -T bash
#
#   Devcontainer
#       Add this file to the dockerComposeFile array in
#       .devcontainer/devcontainer.json:
#
#           "dockerComposeFile": [
#               "../docker/compose.devcontainer.yaml",
#               "../docker/compose.otbr-radio.yaml"
#           ]
#
# ─── Environment variables ────────────────────────────────────────────────────
#
#   RADIO_DEVICE   Host path of the USB serial device.
#                  On a shared build server the device may appear at a
#                  non-default path (e.g. /dev/ttyACM8 if multiple users are
#                  simultaneously forwarding radios via USB-IP). Always set
#                  this explicitly in docker/.env (generated by
#                  docker/setupDockerEnv.sh) or export it before running:
#                      export RADIO_DEVICE=/dev/ttyACM8
#
#   BACKBONE_IF    Network interface for the Thread backbone. Default: the
#                  host default-route interface detected by
#                  docker/setupDockerEnv.sh.
#
# ─── USB-IP (remote radio forwarding) ────────────────────────────────────────
#
#   If your dev server is remote and the radio is on your local workstation,
#   see docs/THREAD_BORDER_ROUTER_SUPPORT.md for USB-IP setup instructions.
#
# ─────────────────────────────────────────────────────────────────────────────

services:
    otbr-radio:
        build:
            context: .
            dockerfile: Dockerfile.otbr-radio
        # privileged is required for:
        #   - creating the wpan0 network interface
        #   - configuring iptables rules for Thread border routing
        #   - accessing the USB serial device via /dev/ttyACM*
        privileged: true
        # Connect to the per-user bridge network so that:
        #   - each user on a shared server gets an isolated wpan0 interface
        #     (host networking would put all wpan0 interfaces into the same namespace)
        #   - NAT64/iptables rules are scoped to this container's network namespace
        #   - D-Bus communication with the barton container is still via the
        #     dbus-socket volume, so no direct network path is required
        networks:
            - otbr-net
        volumes:
            # Share a private D-Bus socket directory with the barton/devcontainer
            # service so Barton code can talk to otbr-agent over D-Bus without
            # ever touching the host's system bus.
            - dbus-socket:/var/run/otbr-dbus
            # Mount the host /dev tree so the container can access whatever
            # serial device RADIO_DEVICE points to (e.g. /dev/ttyACM0,
            # /dev/ttyACM8, /dev/ttyUSB0, etc.).  This avoids a hard-coded
            # devices: mapping that would fail at 'docker compose up' time if
            # the device does not yet exist or appears at a non-default path
            # (common on shared build servers with multiple USB-IP users).
            # The privileged: true above grants the necessary device access.
            - /dev:/dev
        environment:
            # RADIO_DEVICE must be set explicitly before starting this overlay.
            # On a shared build server each user's radio may attach at a
            # different path (e.g. /dev/ttyACM8). The entrypoint validates the
            # path at runtime and exits with a clear error if it is unset or
            # the device does not exist.
            - RADIO_DEVICE=${RADIO_DEVICE:-}
            - BACKBONE_IF=${BACKBONE_IF:-}
            - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/var/run/otbr-dbus/system_bus_socket
        # Restart automatically if cpcd/otbr-agent crash, unless the container
        # was explicitly stopped.
        restart: unless-stopped

    # Add the shared private D-Bus socket volume to the barton service.
    # This grants Barton access to the otbr-agent D-Bus API running in the
    # otbr-radio container without any code changes, while keeping Barton off
    # the host's system bus.
    # In devcontainer mode, this file is layered into the compose stack via
    # devcontainer.json, so this barton service fragment is merged in there.
    barton:
        volumes:
            - dbus-socket:/var/run/otbr-dbus
        environment:
            - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/var/run/otbr-dbus/system_bus_socket

networks:
    # Per-user/workspace bridge network for the otbr-radio container.
    # Using the same $BUILDER_USER-$BARTON_WORKSPACE_ID namespace as the
    # main barton network ensures each user on a shared server gets their
    # own isolated Thread network namespace.
    otbr-net:
        name: $BUILDER_USER-$BARTON_WORKSPACE_ID-otbr-net
        driver: bridge

volumes:
    # Per-user/workspace named volume that shares /var/run/otbr-dbus between
    # the otbr-radio container (where the private dbus-daemon writes its socket)
    # and the devcontainer/barton container (where Barton connects to it).
    # The explicit name uses the same $BUILDER_USER-$BARTON_WORKSPACE_ID prefix
    # as the network above, making per-user D-Bus isolation self-documenting.
    dbus-socket:
        name: $BUILDER_USER-$BARTON_WORKSPACE_ID-otbr-dbus-socket
