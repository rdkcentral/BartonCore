#
# Optional Docker Compose overlay that adds a real Thread Border Router
# container backed by a Silabs BRD2703 xG24 Explorer Kit USB radio.
#
# The container runs:
#   - cpcd        : Silicon Labs CPC daemon (USB serial <-> CPC socket)
#   - otbr-agent  : OpenThread Border Router agent (CPC socket <-> D-Bus API)
#
# A named volume (dbus-socket) shares the D-Bus socket directory between this
# container and the main barton/devcontainer so that Barton code can reach
# otbr-agent over D-Bus exactly as it does with the simulated setup.
#
# Running this overlay is OPTIONAL.  Do not include it unless a physical radio
# is available (either locally attached or forwarded via USB-IP).
#
# ─── Usage ───────────────────────────────────────────────────────────────────
#
#   CLI (dockerw)
#       ./dockerw -T bash
#
#   Devcontainer
#       Add this file to the dockerComposeFile array in
#       .devcontainer/devcontainer.json:
#
#           "dockerComposeFile": [
#               "../docker/compose.devcontainer.yaml",
#               "../docker/compose.otbr-radio.yaml"
#           ]
#
# ─── Environment variables ────────────────────────────────────────────────────
#
#   RADIO_DEVICE   Host path of the USB serial device. Default: /dev/ttyACM0
#                  Set in docker/.env (generated by docker/setupDockerEnv.sh)
#                  or export before running:
#                      export RADIO_DEVICE=/dev/ttyACM1
#
#   BACKBONE_IF    Network interface for the Thread backbone. Default: the
#                  host default-route interface detected by
#                  docker/setupDockerEnv.sh.
#
# ─── USB-IP (remote radio forwarding) ────────────────────────────────────────
#
#   If your dev server is remote and the radio is on your local workstation,
#   see docs/THREAD_BORDER_ROUTER_SUPPORT.md for USB-IP setup instructions.
#
# ─────────────────────────────────────────────────────────────────────────────

services:
    otbr-radio:
        build:
            context: .
            dockerfile: Dockerfile.otbr-radio
        # privileged is required for:
        #   - creating the wpan0 network interface
        #   - configuring iptables rules for Thread border routing
        #   - accessing the USB serial device via /dev/ttyACM*
        privileged: true
        # Host networking is required so that:
        #   - the wpan0 Thread interface is visible on the host network stack
        #   - mDNS/Avahi advertisements reach the LAN
        #   - NAT64 routing functions correctly
        network_mode: host
        volumes:
            # Share the D-Bus socket directory with the barton/devcontainer
            # service so Barton code can talk to otbr-agent over D-Bus.
            - dbus-socket:/var/run/dbus
        devices:
            # Pass through the Silabs USB radio to the container at the same
            # path as the host so RADIO_DEVICE matches inside the container.
            - "${RADIO_DEVICE:-/dev/ttyACM0}:${RADIO_DEVICE:-/dev/ttyACM0}"
        environment:
            - RADIO_DEVICE=${RADIO_DEVICE:-/dev/ttyACM0}
            - BACKBONE_IF=${BACKBONE_IF:-}
        # Restart automatically if cpcd/otbr-agent crash, unless the container
        # was explicitly stopped.
        restart: unless-stopped

    # Extend the barton service to mount the shared D-Bus socket volume.
    # This grants Barton access to the otbr-agent D-Bus API running in the
    # otbr-radio container without any code changes.
    # In devcontainer mode the devcontainer service extends barton, so it
    # inherits this volume automatically.
    barton:
        volumes:
            - dbus-socket:/var/run/dbus

volumes:
    # Named volume that shares /var/run/dbus between the otbr-radio container
    # (where otbr-agent writes its D-Bus socket) and the devcontainer/barton
    # container (where Barton reads it).
    dbus-socket:
