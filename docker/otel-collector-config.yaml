# OpenTelemetry Collector configuration for the Barton observability demo.
#
# Receives OTLP/HTTP on port 4318, exports traces to Jaeger,
# derives RED metrics from spans via the spanmetrics connector,
# and exposes all metrics to Prometheus on port 8889.

receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"

  hostmetrics:
    collection_interval: 15s
    scrapers:
      cpu:
      memory:
      process:
        include:
          match_type: regexp
          names:
            - barton-core-reference

exporters:
  otlp/jaeger:
    endpoint: "jaeger:4317"
    tls:
      insecure: true

  prometheus:
    endpoint: "0.0.0.0:8889"

  debug:
    verbosity: basic

connectors:
  spanmetrics:

processors:
  batch:
    timeout: 2s

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, spanmetrics, debug]
    metrics:
      receivers: [otlp, hostmetrics, spanmetrics]
      processors: [batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
