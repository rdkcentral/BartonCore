# Prettier configuration for BartonCore.
#
# Prettier owns the languages listed under [javascript]/[jsonc]/[markdown]/[yaml]
# in .vscode/settings.json; clang-format owns C/C++ (see .clang-format).
#
# This config aims to match the C/C++ house style (see .clang-format) as closely
# as Prettier allows. IMPORTANT: Prettier cannot reproduce our Allman brace style
# -- it always places the opening brace on the same line, and this is a
# deliberate, non-configurable Prettier design decision. The options below match
# everything else we control: 4-space indent, 120-column width, single quotes,
# and no spacing inside object/container literals (mirrors clang-format's
# SpacesInContainerLiterals: false).

tabWidth: 4
useTabs: false
endOfLine: lf

overrides:
    - files: "*.js"
      options:
          printWidth: 100
          semi: true
          singleQuote: true
          quoteProps: preserve
          trailingComma: none
          bracketSpacing: false
          arrowParens: always
